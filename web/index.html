<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LTE Monitor</title>
<style>
:root {
  --bg:     #0f172a;
  --card:   #1e293b;
  --border: #334155;
  --text:   #e2e8f0;
  --muted:  #94a3b8;
  --accent: #3b82f6;
  --green:  #22c55e;
  --lime:   #86efac;
  --amber:  #f59e0b;
  --orange: #f97316;
  --red:    #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono','Monaco','Cascadia Code','Consolas',monospace;
  font-size: 13px;
  line-height: 1.6;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 18px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  gap: 12px;
  flex-wrap: wrap;
}
.h-title {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 0.3px;
}
.h-right {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
  flex-wrap: wrap;
}
.mode-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.mode-normal { background: rgba(59,130,246,.2); color: #93c5fd; }
.mode-debug  { background: rgba(249,115,22,.2);  color: #fb923c; }
.mode-night  { background: rgba(147,51,234,.2);  color: #c084fc; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
  transition: background .3s;
}
.dot.online  { background: var(--green); }
.dot.offline { background: var(--red); }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
  max-width: 1100px;
  margin: 0 auto;
}
@media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.card.wide { grid-column: 1 / -1; }
.card-title {
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title-text { flex: 1; }
.row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 2px 0;
  gap: 8px;
}
.lbl { color: var(--muted); white-space: nowrap; }
.val { font-weight: 600; text-align: right; }
.qbadge {
  font-size: 10px;
  font-weight: bold;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-left: 6px;
}
.q-excellent { color: var(--green); }
.q-good      { color: var(--lime); }
.q-fair      { color: var(--amber); }
.q-poor      { color: var(--orange); }
.q-vp        { color: var(--red); }
.b-excellent { background: rgba(34,197,94,.15);  color: var(--green); }
.b-good      { background: rgba(134,239,172,.15);color: var(--lime); }
.b-fair      { background: rgba(245,158,11,.15); color: var(--amber); }
.b-poor      { background: rgba(249,115,22,.15); color: var(--orange); }
.b-vp        { background: rgba(239,68,68,.15);  color: var(--red); }
.bar-wrap {
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 3px;
  margin-bottom: 6px;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width .4s ease;
}
.ping-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.ping-row:last-child { border-bottom: none; }
.ping-label { min-width: 80px; }
.ping-loss-ok   { color: var(--green); }
.ping-loss-warn { color: var(--amber); }
.ping-loss-bad  { color: var(--red); }
.ev-row {
  display: flex;
  gap: 10px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  flex-wrap: wrap;
}
.ev-row:last-child { border-bottom: none; }
.ev-time   { color: var(--muted); white-space: nowrap; }
.ev-type   { font-weight: bold; white-space: nowrap; }
.ev-info     { color: var(--accent); }
.ev-warning  { color: var(--amber); }
.ev-critical { color: var(--red); }
.ev-det { color: var(--muted); font-size: 11px; word-break: break-all; }
.col-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
  gap: 12px;
}
.col-name { color: var(--muted); }
.col-ok      { color: var(--green); }
.col-error   { color: var(--red); }
.col-never   { color: var(--border); }
.empty { color: var(--muted); font-style: italic; padding: 4px 0; }
/* chart */
.chart-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.chart-btn-group {
  display: flex;
  gap: 4px;
}
.chart-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background .15s, color .15s, border-color .15s;
}
.chart-btn:hover { border-color: var(--accent); color: var(--text); }
.chart-btn.active { background: rgba(59,130,246,.2); border-color: var(--accent); color: #93c5fd; }
.chart-wrap {
  margin-top: 10px;
  width: 100%;
}
.chart-wrap svg { display: block; width: 100%; height: 190px; }
/* config */
.cfg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0;
}
.cfg-item {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  border-bottom: 1px solid rgba(51,65,85,.5);
  gap: 8px;
}
.cfg-item:last-child { border-bottom: none; }
.cfg-key { color: var(--muted); font-size: 12px; }
.cfg-val { font-weight: 600; font-size: 12px; word-break: break-all; text-align: right; }
</style>
</head>
<body>

<header>
  <div class="h-title">
    <svg viewBox="0 0 20 16" width="18" height="14" style="vertical-align:middle;margin-right:7px" fill="none">
      <circle cx="10" cy="15" r="1.8" fill="#3b82f6"/>
      <path d="M6.2 11.8a5.5 5.5 0 0 1 7.6 0" stroke="#3b82f6" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M3.4 9a10 10 0 0 1 13.2 0" stroke="#3b82f6" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M0.6 6.2a14.5 14.5 0 0 1 18.8 0" stroke="#3b82f6" stroke-width="1.6" stroke-linecap="round"/>
    </svg>asus-lte-telemetry
  </div>
  <div class="h-right">
    <span id="mode-badge" class="mode-badge mode-normal">normal</span>
    <span id="status-dot" class="dot"></span>
    <span id="updated" style="color:var(--muted)">—</span>
    <span id="countdown" style="color:var(--border);font-size:11px"></span>
  </div>
</header>

<div class="grid">

  <!-- Signal -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">Signal</span></div>
    <div id="sig-body"><div class="empty">No LTE data yet.</div></div>
  </div>

  <!-- CA -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">Carrier Aggregation</span></div>
    <div id="ca-body"><div class="empty">No CA data.</div></div>
  </div>

  <!-- History Chart -->
  <div class="card wide">
    <div class="card-title">
      <span class="card-title-text">Signal History</span>
      <div class="chart-controls">
        <div class="chart-btn-group" id="metric-btns">
          <button class="chart-btn active" data-metric="rsrp">RSRP</button>
          <button class="chart-btn" data-metric="sinr">SINR</button>
          <button class="chart-btn" data-metric="rsrq">RSRQ</button>
          <button class="chart-btn" data-metric="rssi">RSSI</button>
        </div>
        <div class="chart-btn-group" id="hours-btns">
          <button class="chart-btn" data-hours="6">6h</button>
          <button class="chart-btn active" data-hours="24">24h</button>
          <button class="chart-btn" data-hours="72">3d</button>
          <button class="chart-btn" data-hours="168">7d</button>
        </div>
        <span id="chart-info" style="color:var(--muted);font-size:11px"></span>
      </div>
    </div>
    <div class="chart-wrap" id="chart-wrap">
      <div class="empty">Loading chart…</div>
    </div>
  </div>

  <!-- System -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">System</span></div>
    <div id="sys-body"><div class="empty">No system data yet.</div></div>
  </div>

  <!-- Ping -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">Ping</span></div>
    <div id="ping-body"><div class="empty">No ping data yet.</div></div>
  </div>

  <!-- Collectors -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">Collectors</span></div>
    <div id="col-body"><div class="empty">—</div></div>
  </div>

  <!-- Temp -->
  <div class="card">
    <div class="card-title"><span class="card-title-text">Temp</span></div>
    <div id="temp-body"><div class="empty">No temp data.</div></div>
  </div>

  <!-- Config -->
  <div class="card wide">
    <div class="card-title"><span class="card-title-text">Configuration</span></div>
    <div id="cfg-body"><div class="empty">—</div></div>
  </div>

  <!-- Events -->
  <div class="card wide">
    <div class="card-title"><span class="card-title-text">Recent Events</span></div>
    <div id="ev-body"><div class="empty">(none)</div></div>
  </div>

</div>

<script>
'use strict';

const REFRESH  = 30;
const API      = 'cgi-bin/api.cgi';
const HIST     = 'cgi-bin/history.cgi';
let countdown  = REFRESH;
let ticker     = null;

let chartMetric = 'rsrp';
let chartHours  = 24;

// ---------------------------------------------------------------------------
// signal quality helpers
// ---------------------------------------------------------------------------
function qRsrp(v) {
  if (v == null) return 'unknown';
  if (v >= -80)  return 'excellent';
  if (v >= -90)  return 'good';
  if (v >= -100) return 'fair';
  if (v >= -110) return 'poor';
  return 'vp';
}
function qSinr(v) {
  if (v == null) return 'unknown';
  if (v >= 20) return 'excellent';
  if (v >= 13) return 'good';
  if (v >= 0)  return 'fair';
  return 'poor';
}
function qRsrq(v) {
  if (v == null) return 'unknown';
  if (v >= -5)  return 'excellent';
  if (v >= -10) return 'good';
  if (v >= -15) return 'fair';
  if (v >= -20) return 'poor';
  return 'vp';
}
function qTxPower(v) {
  if (v == null) return 'unknown';
  if (v < 0)   return 'excellent';
  if (v < 10)  return 'good';
  if (v < 18)  return 'fair';
  return 'poor';
}
const Q_LABEL = {excellent:'Excellent', good:'Good', fair:'Fair', poor:'Poor', vp:'Very Poor', unknown:'—'};
const Q_COLOR = {excellent:'#22c55e', good:'#86efac', fair:'#f59e0b', poor:'#f97316', vp:'#ef4444', unknown:'#94a3b8'};

function fmtUptime(s) {
  if (!s) return '—';
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function fmtAge(ts) {
  if (!ts || ts === '0' || ts === 0) return 'never';
  const d = Math.floor(Date.now()/1000) - (+ts);
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ' + Math.floor((d%3600)/60) + 'm ago';
  return Math.floor(d/86400) + 'd ago';
}

function esc(s) {
  if (s == null) return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function row(label, valHtml) {
  return '<div class="row"><span class="lbl">' + esc(label) + '</span><span class="val">' + valHtml + '</span></div>';
}

// ---------------------------------------------------------------------------
// section updaters
// ---------------------------------------------------------------------------
function cellMapperUrl(sig) {
  if (!sig || !sig.mcc || !sig.mnc) return null;
  const dec = sig.cell_id_dec != null ? sig.cell_id_dec
            : (sig.cell_id_hex ? parseInt(sig.cell_id_hex, 16) : null);
  if (dec == null) return null;
  return 'https://www.cellmapper.net/map#?type=LTE&mcc=' + sig.mcc +
         '&mnc=' + sig.mnc + '&cell=' + dec +
         (sig.pci != null ? '&physical_cell_id=' + sig.pci : '') + '&zoom=15';
}

function updateSignal(sig) {
  const el = document.getElementById('sig-body');
  if (!sig) { el.innerHTML = '<div class="empty">No LTE data yet.</div>'; return; }
  const qr = qRsrp(sig.rsrp), qs = qSinr(sig.sinr), qq = qRsrq(sig.rsrq), qt = qTxPower(sig.tx_power);

  const dec = sig.cell_id_dec != null ? sig.cell_id_dec
            : (sig.cell_id_hex ? parseInt(sig.cell_id_hex, 16) : null);
  const cmUrl = cellMapperUrl(sig);
  const cellLabel = (sig.cell_id_hex || '—') +
    (dec != null ? ' <span style="color:var(--muted);font-size:11px">('+dec+')</span>' : '');
  const cellVal = cmUrl
    ? cellLabel + ' / ' + esc(sig.pci != null ? sig.pci : '—') +
      ' <a href="' + cmUrl + '" target="_blank" rel="noopener" ' +
      'style="color:var(--accent);font-size:11px;text-decoration:none;margin-left:4px" title="Open in CellMapper">&#8599;</a>'
    : cellLabel + ' / ' + esc(sig.pci != null ? sig.pci : '—');

  el.innerHTML =
    row('Operator', esc(sig.operator || '—')) +
    row('Band', esc(sig.band ? 'B'+sig.band+' '+sig.duplex+' '+sig.rat : '—')) +
    row('RRC',  esc(sig.rrc_state || '—')) +
    row('RSRP',
      '<span class="q-'+qr+'">' + (sig.rsrp != null ? sig.rsrp+' dBm' : '—') + '</span>' +
      '<span class="qbadge b-'+qr+'">'+Q_LABEL[qr]+'</span>') +
    row('RSRQ',
      '<span class="q-'+qq+'">' + (sig.rsrq != null ? sig.rsrq+' dB' : '—') + '</span>' +
      '<span class="qbadge b-'+qq+'">'+Q_LABEL[qq]+'</span>') +
    row('SINR',
      '<span class="q-'+qs+'">' + (sig.sinr != null ? sig.sinr+' dB' : '—') + '</span>' +
      '<span class="qbadge b-'+qs+'">'+Q_LABEL[qs]+'</span>') +
    row('TX Power',
      '<span class="q-'+qt+'">' + (sig.tx_power != null ? sig.tx_power+' dBm' : '—') + '</span>') +
    '<div class="row"><span class="lbl">Cell / PCI</span><span class="val" style="font-size:12px">' + cellVal + '</span></div>' +
    row('EARFCN', esc(sig.earfcn || '—'));
}

function updateCA(ca) {
  const el = document.getElementById('ca-body');
  if (!ca || ca.length === 0) {
    el.innerHTML = '<div class="empty">No carrier aggregation active.</div>';
    return;
  }
  let html = row('Carriers', String(ca.length));
  ca.forEach(function(c) {
    html += row(
      (c.type||'?').toUpperCase() + ' B' + (c.band||'?'),
      esc(c.rsrp != null ? c.rsrp+' dBm' : '—') + ' / SINR ' + esc(c.sinr != null ? c.sinr+' dB' : '—')
    );
  });
  el.innerHTML = html;
}

function updateSystem(sys) {
  const el = document.getElementById('sys-body');
  if (!sys) { el.innerHTML = '<div class="empty">No system data yet.</div>'; return; }
  const memPct  = sys.mem_total_kb  > 0 ? Math.round(sys.mem_used_kb  / sys.mem_total_kb  * 100) : 0;
  const swapPct = sys.swap_total_kb > 0 ? Math.round(sys.swap_used_kb / sys.swap_total_kb * 100) : 0;
  const diskPct = sys.disk_data_pct || 0;
  function bar(pct) {
    return '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
  }
  let html =
    row('Uptime', esc(fmtUptime(sys.uptime_sec))) +
    row('Load 1m', sys.load_1min != null ? Number(sys.load_1min).toFixed(2) : '—') +
    row('RAM',     memPct + '%') + bar(memPct) +
    row('Swap',    swapPct + '%') + bar(swapPct) +
    row('Disk',    diskPct + '%') + bar(diskPct);
  if (sys.cpu_temp != null)
    html += row('CPU Temp', sys.cpu_temp + ' °C');
  el.innerHTML = html;
}

function updatePing(ping) {
  const el = document.getElementById('ping-body');
  if (!ping || ping.length === 0) {
    el.innerHTML = '<div class="empty">No ping data yet.</div>';
    return;
  }
  el.innerHTML = ping.map(function(p) {
    const loss = p.loss_pct != null ? p.loss_pct : '?';
    const cls  = loss === 0 ? 'ping-loss-ok' : loss < 10 ? 'ping-loss-warn' : 'ping-loss-bad';
    const rtt  = p.rtt_avg_ms != null ? Number(p.rtt_avg_ms).toFixed(1)+' ms' : '—';
    return '<div class="ping-row">' +
      '<span class="ping-label">' + esc(p.label||p.target) + '</span>' +
      '<span class="'+cls+'">'    + loss + '%</span>' +
      '<span>'                    + rtt  + '</span>' +
      '</div>';
  }).join('');
}

function updateTemp(temp) {
  const el = document.getElementById('temp-body');
  if (!temp) { el.innerHTML = '<div class="empty">No temp data.</div>'; return; }
  let html = '';
  if (temp.xo_therm  != null) html += row('XO therm',  temp.xo_therm  + ' °C');
  if (temp.mdm_case  != null) html += row('Modem case',temp.mdm_case  + ' °C');
  if (temp.pa_therm  != null) html += row('PA therm',  temp.pa_therm  + ' °C');
  el.innerHTML = html || '<div class="empty">No readings.</div>';
}

function updateCollectors(cols) {
  const el = document.getElementById('col-body');
  if (!cols) { el.innerHTML = '<div class="empty">—</div>'; return; }
  const names = ['lte','ping','system','vnstat'];
  el.innerHTML = names.map(function(n) {
    const c = cols[n];
    if (!c) return '';
    const status  = c.status || 'never';
    const ageStr  = fmtAge(c.last_run_ts);
    const cls     = status === 'ok' ? 'col-ok' : status === 'error' ? 'col-error' : 'col-never';
    return '<div class="col-row">' +
      '<span class="col-name">' + n + '</span>' +
      '<span style="color:var(--muted);font-size:11px">' + ageStr + '</span>' +
      '<span class="' + cls + '">[' + status + ']</span>' +
      '</div>';
  }).join('');
}

function updateConfig(cfg) {
  const el = document.getElementById('cfg-body');
  if (!cfg || typeof cfg !== 'object') { el.innerHTML = '<div class="empty">—</div>'; return; }
  const items = [
    ['AT port',        cfg.at_port],
    ['WAN interface',  cfg.wan_iface],
    ['Log level',      cfg.log_level],
    ['Auto-switch',    cfg.auto_switch],
    ['SINR threshold', cfg.sinr_threshold != null ? cfg.sinr_threshold + ' dB' : null],
    ['LTE interval',   cfg.lte_interval  != null ? cfg.lte_interval  + ' s' : null],
    ['Sys interval',   cfg.sys_interval  != null ? cfg.sys_interval  + ' s' : null],
    ['Ping interval',  cfg.ping_interval != null ? cfg.ping_interval + ' s' : null],
    ['Dashboard port', cfg.dash_port],
    ['Retention',      cfg.retention_days != null ? cfg.retention_days + ' days' : null],
  ];
  el.innerHTML = '<div class="cfg-grid">' +
    items.filter(function(i){ return i[1] != null && i[1] !== ''; }).map(function(i) {
      return '<div class="cfg-item">' +
        '<span class="cfg-key">' + esc(i[0]) + '</span>' +
        '<span class="cfg-val">' + esc(i[1]) + '</span>' +
        '</div>';
    }).join('') +
    '</div>';
}

function updateEvents(events) {
  const el = document.getElementById('ev-body');
  if (!events || events.length === 0) {
    el.innerHTML = '<div class="empty">(none)</div>';
    return;
  }
  el.innerHTML = events.map(function(e) {
    const dt  = e.ts ? new Date(e.ts*1000).toLocaleString() : '—';
    const sev = e.severity || 'info';
    let det = '';
    if (e.details) {
      try { det = JSON.stringify(JSON.parse(e.details)); } catch(_) { det = String(e.details); }
    }
    return '<div class="ev-row">' +
      '<span class="ev-time">' + esc(dt) + '</span>' +
      '<span class="ev-type ev-'+sev+'">' + esc(e.type||'?') + '</span>' +
      (det ? '<span class="ev-det">' + esc(det) + '</span>' : '') +
      '</div>';
  }).join('');
}

// ---------------------------------------------------------------------------
// chart
// ---------------------------------------------------------------------------
function drawChart(hd) {
  const wrap = document.getElementById('chart-wrap');
  if (!hd || !hd.data || hd.data.length < 2) {
    wrap.innerHTML = '<div class="empty">Not enough data yet (' + (hd && hd.count || 0) + ' points).</div>';
    return;
  }

  const data = hd.data;
  const W = 900, H = 190;
  const PL = 46, PR = 12, PT = 14, PB = 28;
  const cw = W - PL - PR;
  const ch = H - PT - PB;

  const vals = data.map(function(d){ return d.v; });
  let mn = hd.min !== null ? +hd.min : Math.min.apply(null, vals);
  let mx = hd.max !== null ? +hd.max : Math.max.apply(null, vals);
  const spread = mx - mn || 2;
  mn = mn - spread * 0.08;
  mx = mx + spread * 0.08;
  const yRng = mx - mn;

  const t0 = data[0].ts;
  const t1 = data[data.length - 1].ts;
  const tRng = t1 - t0 || 1;

  function xp(ts) { return PL + (ts - t0) / tRng * cw; }
  function yp(v)  { return PT + ch - (v - mn) / yRng * ch; }

  // line color from last value quality
  const lastV = vals[vals.length - 1];
  const color = chartMetric === 'rsrp' ? Q_COLOR[qRsrp(lastV)]
              : chartMetric === 'sinr' ? Q_COLOR[qSinr(lastV)]
              : chartMetric === 'rsrq' ? Q_COLOR[qRsrq(lastV)]
              : '#3b82f6';

  // polyline
  const pts = data.map(function(d){
    return xp(d.ts).toFixed(1) + ',' + yp(d.v).toFixed(1);
  }).join(' ');

  // Y grid + labels (5 lines)
  let gridSvg = '', yLblSvg = '';
  for (var i = 0; i <= 4; i++) {
    var yv = mn + (yRng / 4) * i;
    var yy = yp(yv).toFixed(1);
    gridSvg  += '<line x1="' + PL + '" y1="' + yy + '" x2="' + (W-PR) + '" y2="' + yy +
                '" stroke="#334155" stroke-width="1"/>';
    yLblSvg  += '<text x="' + (PL-4) + '" y="' + yy + '" text-anchor="end" dominant-baseline="middle"' +
                ' fill="#94a3b8" font-size="10">' + Math.round(yv) + '</text>';
  }

  // X axis labels
  const intervalSec = chartHours <= 6 ? 3600 : chartHours <= 48 ? 14400 : 86400;
  const nowEpoch  = Math.floor(Date.now() / 1000);
  const sinceEpoch = hd.since || (nowEpoch - chartHours * 3600);
  let xLblSvg = '';
  var lt = Math.ceil(sinceEpoch / intervalSec) * intervalSec;
  while (lt <= nowEpoch) {
    if (lt >= t0 && lt <= t1) {
      var xx = xp(lt).toFixed(1);
      var d  = new Date(lt * 1000);
      var lbl = chartHours <= 48
        ? pad2(d.getHours()) + ':' + pad2(d.getMinutes())
        : (d.getMonth()+1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + 'h';
      xLblSvg += '<line x1="' + xx + '" y1="' + PT + '" x2="' + xx + '" y2="' + (H-PB) +
                 '" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>';
      xLblSvg += '<text x="' + xx + '" y="' + (H-PB+14) + '" text-anchor="middle"' +
                 ' fill="#94a3b8" font-size="10">' + lbl + '</text>';
    }
    lt += intervalSec;
  }

  const unit = chartMetric === 'sinr' || chartMetric === 'rsrq' ? 'dB' : 'dBm';

  wrap.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
    gridSvg + xLblSvg + yLblSvg +
    '<text x="' + PL + '" y="' + (PT-2) + '" fill="#64748b" font-size="9">' +
      chartMetric.toUpperCase() + ' (' + unit + ')</text>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color +
      '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    '</svg>';
}

function pad2(n) { return n < 10 ? '0' + n : String(n); }

async function fetchChart() {
  const url = HIST + '?metric=' + chartMetric + '&hours=' + chartHours + '&_=' + Date.now();
  try {
    const r = await fetch(url);
    if (!r.ok) return;
    const hd = await r.json();
    drawChart(hd);
    const info = document.getElementById('chart-info');
    if (info) info.textContent = hd.count ? hd.count + ' pts' : '';
  } catch(_) {}
}

// ---------------------------------------------------------------------------
// chart controls
// ---------------------------------------------------------------------------
document.getElementById('metric-btns').addEventListener('click', function(e) {
  const btn = e.target.closest('.chart-btn');
  if (!btn || !btn.dataset.metric) return;
  chartMetric = btn.dataset.metric;
  document.querySelectorAll('#metric-btns .chart-btn').forEach(function(b){
    b.classList.toggle('active', b === btn);
  });
  fetchChart();
});

document.getElementById('hours-btns').addEventListener('click', function(e) {
  const btn = e.target.closest('.chart-btn');
  if (!btn || !btn.dataset.hours) return;
  chartHours = +btn.dataset.hours;
  document.querySelectorAll('#hours-btns .chart-btn').forEach(function(b){
    b.classList.toggle('active', b === btn);
  });
  fetchChart();
});

// ---------------------------------------------------------------------------
// main fetch & render
// ---------------------------------------------------------------------------
async function refresh() {
  try {
    const r = await fetch(API + '?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();

    const mb = document.getElementById('mode-badge');
    const mode = d.mode || 'normal';
    mb.textContent = mode;
    mb.className = 'mode-badge mode-' + (mode === 'debug' || mode === 'night' ? mode : 'normal');

    updateSignal(d.signal);
    updateCA(d.ca);
    updateSystem(d.system);
    updatePing(d.ping);
    updateTemp(d.temp);
    updateCollectors(d.collectors);
    updateConfig(d.config);
    updateEvents(d.events);

    document.getElementById('updated').textContent = new Date().toLocaleTimeString();
    document.getElementById('status-dot').className = 'dot online';
    countdown = REFRESH;
  } catch(e) {
    document.getElementById('status-dot').className = 'dot offline';
    console.error('API error:', e);
  }

  fetchChart();
}

function tick() {
  countdown--;
  if (countdown <= 0) { countdown = REFRESH; refresh(); }
  const el = document.getElementById('countdown');
  if (el) el.textContent = countdown + 's';
}

refresh();
ticker = setInterval(tick, 1000);
</script>
</body>
</html>
